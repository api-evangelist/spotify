naftiko: "1.0.0-alpha1"

info:
  label: "Spotify Web API"
  description: "Shared capability definition for the Spotify Web API, providing access to music and podcast catalog, user library, playback control, and personalization."
  tags:
    - Music
    - Audio
    - Streaming
    - Playlists
    - Podcasts
    - Player
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SPOTIFY_ACCESS_TOKEN: SPOTIFY_ACCESS_TOKEN

capability:
  consumes:
    - type: http
      namespace: spotify
      baseUri: https://api.spotify.com/v1
      description: "Spotify Web API for music discovery, library management, and playback control"
      authentication:
        type: bearer
        token: "{{SPOTIFY_ACCESS_TOKEN}}"
      resources:
        - name: search
          path: /search
          description: "Search Spotify catalog"
          operations:
            - name: search
              method: GET
              description: "Search for tracks, albums, artists, playlists, shows, or episodes"
              inputParameters:
                - name: q
                  in: query
                  type: string
                  required: true
                  description: "Search query"
                - name: type
                  in: query
                  type: string
                  required: true
                  description: "Comma-separated types: track,album,artist,playlist,show,episode"
                - name: market
                  in: query
                  type: string
                  required: false
                  description: "ISO 3166-1 alpha-2 market code"
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: "Max results per type (1-50)"
                - name: offset
                  in: query
                  type: integer
                  required: false
                  description: "Pagination offset"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: track
          path: /tracks/{id}
          description: "Single track"
          operations:
            - name: get-track
              method: GET
              description: "Get a track by Spotify ID"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Spotify track ID"
                - name: market
                  in: query
                  type: string
                  required: false
                  description: "Market for track availability"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: artist
          path: /artists/{id}
          description: "Single artist"
          operations:
            - name: get-artist
              method: GET
              description: "Get an artist by Spotify ID"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Spotify artist ID"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: artist-albums
          path: /artists/{id}/albums
          description: "Artist's albums"
          operations:
            - name: get-artist-albums
              method: GET
              description: "Get an artist's albums"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Spotify artist ID"
                - name: include_groups
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated: album,single,appears_on,compilation"
                - name: market
                  in: query
                  type: string
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: items
                  type: array
                  value: "$.items"

        - name: album
          path: /albums/{id}
          description: "Single album"
          operations:
            - name: get-album
              method: GET
              description: "Get an album by Spotify ID"
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: "Spotify album ID"
                - name: market
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: player
          path: /me/player
          description: "Playback state and control"
          operations:
            - name: get-playback-state
              method: GET
              description: "Get current playback state"
              inputParameters:
                - name: market
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: transfer-playback
              method: PUT
              description: "Transfer playback to a different device"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  device_ids: "{{tools.device_ids}}"
                  play: "{{tools.play}}"

        - name: player-play
          path: /me/player/play
          description: "Start or resume playback"
          operations:
            - name: start-resume-playback
              method: PUT
              description: "Start or resume playback on the active device"
              inputParameters:
                - name: device_id
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  context_uri: "{{tools.context_uri}}"
                  uris: "{{tools.uris}}"
                  offset: "{{tools.offset}}"

        - name: player-pause
          path: /me/player/pause
          description: "Pause playback"
          operations:
            - name: pause-playback
              method: PUT
              description: "Pause playback on the current device"
              inputParameters:
                - name: device_id
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: player-next
          path: /me/player/next
          description: "Skip to next track"
          operations:
            - name: skip-to-next
              method: POST
              description: "Skip to the next track in the queue"
              inputParameters:
                - name: device_id
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: player-queue
          path: /me/player/queue
          description: "Playback queue"
          operations:
            - name: get-queue
              method: GET
              description: "Get the user's playback queue"
              inputParameters: []
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: add-to-queue
              method: POST
              description: "Add an item to the playback queue"
              inputParameters:
                - name: uri
                  in: query
                  type: string
                  required: true
                  description: "Spotify URI of item to queue"
                - name: device_id
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: playlist
          path: /playlists/{playlist_id}
          description: "Playlist details"
          operations:
            - name: get-playlist
              method: GET
              description: "Get a playlist by Spotify ID"
              inputParameters:
                - name: playlist_id
                  in: path
                  type: string
                  required: true
                  description: "Spotify playlist ID"
                - name: market
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: playlist-items
          path: /playlists/{playlist_id}/items
          description: "Playlist tracks/items"
          operations:
            - name: get-playlist-items
              method: GET
              description: "Get tracks in a playlist"
              inputParameters:
                - name: playlist_id
                  in: path
                  type: string
                  required: true
                - name: market
                  in: query
                  type: string
                  required: false
                - name: limit
                  in: query
                  type: integer
                  required: false
                - name: offset
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: items
                  type: array
                  value: "$.items"
            - name: add-tracks-to-playlist
              method: POST
              description: "Add tracks to a playlist"
              inputParameters:
                - name: playlist_id
                  in: path
                  type: string
                  required: true
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  uris: "{{tools.uris}}"
                  position: "{{tools.position}}"

        - name: user-playlists
          path: /me/playlists
          description: "Current user's playlists"
          operations:
            - name: get-my-playlists
              method: GET
              description: "Get playlists owned or followed by the current user"
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                - name: offset
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: items
                  type: array
                  value: "$.items"

        - name: recommendations
          path: /recommendations
          description: "Track recommendations"
          operations:
            - name: get-recommendations
              method: GET
              description: "Get track recommendations based on seeds"
              inputParameters:
                - name: seed_artists
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated artist IDs"
                - name: seed_tracks
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated track IDs"
                - name: seed_genres
                  in: query
                  type: string
                  required: false
                  description: "Comma-separated genre names"
                - name: limit
                  in: query
                  type: integer
                  required: false
                - name: market
                  in: query
                  type: string
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: tracks
                  type: array
                  value: "$.tracks"

        - name: user-top
          path: /me/top/{type}
          description: "User's top artists or tracks"
          operations:
            - name: get-users-top-items
              method: GET
              description: "Get the user's top artists or tracks"
              inputParameters:
                - name: type
                  in: path
                  type: string
                  required: true
                  description: "artists or tracks"
                - name: time_range
                  in: query
                  type: string
                  required: false
                  description: "short_term, medium_term, or long_term"
                - name: limit
                  in: query
                  type: integer
                  required: false
              outputRawFormat: json
              outputParameters:
                - name: items
                  type: array
                  value: "$.items"

  exposes:
    - type: rest
      port: 8100
      namespace: spotify-web-rest
      resources:
        - path: /v1/search
          name: search
          operations:
            - method: GET
              name: search
              description: "Search Spotify catalog"
              call: "spotify.search"
              with:
                q: "rest.q"
                type: "rest.type"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: spotify-web-mcp
      transport: http
      tools:
        - name: search-spotify
          description: "Search the Spotify catalog for tracks, albums, artists, playlists, or podcasts"
          hints:
            readOnly: true
            openWorld: true
          call: "spotify.search"
          with:
            q: "tools.q"
            type: "tools.type"
          outputParameters:
            - type: object
              mapping: "$."
