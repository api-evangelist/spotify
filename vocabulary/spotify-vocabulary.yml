vocabulary:
  name: Spotify Music Vocabulary
  description: >-
    Domain vocabulary for the Spotify music platform, covering music metadata, playback,
    user library management, audio analysis, personalization, and podcast content.
  version: "1.0.0"
  created: "2026-05-02"
  modified: "2026-05-02"
  provider: Spotify
  domain: Music Streaming

terms:
  - term: Spotify URI
    definition: >-
      A unique identifier for any Spotify content resource in the format spotify:{type}:{id},
      where type is track, album, artist, playlist, show, episode, or user.
    tags: [Identity, Reference]
    aliases: [URI, Spotify ID]
    examples: ["spotify:track:0VjIjW4GlUZAMYd2vXMi3b", "spotify:playlist:3cEYpjA9oz9GiPac4AsH4n"]

  - term: Track
    definition: >-
      A single recorded song or audio piece in the Spotify catalog. Tracks have metadata
      including artists, album, duration, popularity, and audio features like tempo and energy.
    tags: [Music, Content]
    aliases: [song, recording]
    schema_type: MusicRecording

  - term: Artist
    definition: >-
      A musician, band, or performer with a Spotify profile. Artists have genres, popularity
      scores, and can be followed by users. Each artist has a unique 22-character Spotify ID.
    tags: [Music, Creator]
    schema_type: MusicGroup

  - term: Album
    definition: >-
      A collection of tracks released together. Album types include album (full-length),
      single (1-3 tracks), and compilation (tracks from multiple releases).
    tags: [Music, Content]
    schema_type: MusicAlbum

  - term: Playlist
    definition: >-
      A user-curated or Spotify-curated ordered collection of tracks. Playlists can be
      public or private and optionally collaborative, allowing other users to contribute.
    tags: [Music, Curation]
    schema_type: MusicPlaylist

  - term: Audio Features
    definition: >-
      Quantitative musical attributes of a track derived from acoustic analysis:
      danceability, energy, key, loudness, mode, speechiness, acousticness,
      instrumentalness, liveness, valence, and tempo.
    tags: [Analysis, Audio]
    aliases: [audio analysis features, track features]

  - term: Audio Analysis
    definition: >-
      Detailed beat-by-beat analysis of a track's structure, including bars, beats, sections,
      segments, and tatums. Used for building synchronized visualizations or DJ tools.
    tags: [Analysis, Audio]

  - term: Recommendations
    definition: >-
      Algorithmically generated track suggestions based on seed artists, tracks, or genres,
      tunable by audio feature targets (e.g., target_energy=0.8, target_tempo=120).
    tags: [Discovery, Personalization]
    aliases: [radio, suggestions, discovery]

  - term: Seed
    definition: >-
      An input to the recommendations engine: either a track ID, artist ID, or genre name.
      The API accepts up to 5 seeds total across all seed types per request.
    tags: [Discovery, Recommendations]

  - term: Playback State
    definition: >-
      The current state of a user's Spotify playback session: whether playing or paused,
      the current track, position in track, active device, shuffle mode, and repeat mode.
    tags: [Playback, State]

  - term: Device
    definition: >-
      A Spotify-connected device that can play music: smartphone, tablet, computer,
      smart speaker, game console, or TV. Devices are identified by device ID.
    tags: [Playback, Hardware]

  - term: Context
    definition: >-
      The playback context (album, artist, or playlist) from which tracks are being played.
      Contexts are identified by their Spotify URI and affect shuffle and queue behavior.
    tags: [Playback, Context]

  - term: Queue
    definition: >-
      The list of tracks to be played next, composed of tracks from the current context
      (with shuffle if enabled) plus any manually queued tracks added by the user.
    tags: [Playback, Queue]

  - term: Snapshot ID
    definition: >-
      A version identifier for a playlist that changes whenever the playlist's contents
      or metadata are modified. Used to ensure idempotent playlist updates.
    tags: [Playlists, Versioning]

  - term: Popularity
    definition: >-
      A 0-100 integer score for tracks and artists reflecting recent streaming volume.
      Popularity is calculated by Spotify's algorithm and updates regularly.
    tags: [Analytics, Discovery]

  - term: Market
    definition: >-
      An ISO 3166-1 alpha-2 country code (e.g., "US", "GB", "JP") used to filter content
      availability and pricing. Content availability varies by market due to licensing.
    tags: [Availability, Geographic]
    aliases: [country, region]

  - term: Scope
    definition: >-
      An OAuth 2.0 permission that users grant to an app during authorization. Scopes
      control access to sensitive operations like reading library, modifying playback,
      or accessing private playlists (e.g., user-library-read, user-modify-playback-state).
    tags: [Authorization, Security]
    aliases: [OAuth scope, permission]

  - term: Show
    definition: >-
      A Spotify podcast series with one or more episodes. Shows have publisher metadata,
      explicit content flags, available markets, and episode listings.
    tags: [Podcasts, Content]
    schema_type: PodcastSeries

  - term: Episode
    definition: >-
      A single episode of a podcast show on Spotify. Episodes can be saved to library,
      added to playlists, and played like tracks.
    tags: [Podcasts, Content]
    schema_type: PodcastEpisode

  - term: Audiobook
    definition: >-
      A long-form audio content type on Spotify, distinct from podcasts and music.
      Audiobooks have chapters and are managed through the library system.
    tags: [Audiobooks, Content]

  - term: Time Range
    definition: >-
      The time window for personalization data: short_term (4 weeks), medium_term (6 months),
      or long_term (all-time). Used when fetching a user's top artists or tracks.
    tags: [Personalization, Analytics]

  - term: Authorization Code Flow
    definition: >-
      The recommended OAuth 2.0 flow for Spotify Web API access when users interact with
      your app. Returns an authorization code exchanged for access and refresh tokens.
    tags: [Authorization, OAuth]

  - term: PKCE
    definition: >-
      Proof Key for Code Exchange - an enhanced security extension to the Authorization
      Code Flow used for single-page apps and mobile apps without a client secret.
    tags: [Authorization, Security]

  - term: Client Credentials Flow
    definition: >-
      An OAuth 2.0 flow for server-to-server API requests that don't require user authorization.
      Provides access only to non-user-specific endpoints like search and catalog lookups.
    tags: [Authorization, OAuth]

  - term: Danceability
    definition: >-
      An audio feature value from 0.0 to 1.0 describing how suitable a track is for dancing
      based on tempo, rhythm stability, beat strength, and overall regularity.
    tags: [Audio Analysis, Features]

  - term: Valence
    definition: >-
      An audio feature value from 0.0 to 1.0 describing the musical positiveness of a track.
      High valence tracks sound more positive (happy, cheerful), low valence more negative.
    tags: [Audio Analysis, Features]

classifications:
  content_types:
    - track
    - album
    - artist
    - playlist
    - show
    - episode
    - audiobook
    - chapter
    - user
  album_types:
    - album
    - single
    - compilation
  playback_repeat_states:
    - off
    - track
    - context
  time_ranges:
    - short_term
    - medium_term
    - long_term
  auth_flows:
    - authorization_code
    - authorization_code_pkce
    - client_credentials
    - implicit_grant
